<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kaleb Wright</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">

    <div class="logo">
      KALEB
    </div>

   

    <div class="toggle"></div>

  </nav>

  <main class="container">

    <!-- LEFT -->

    <section class="left-panel">

      <button class="arrow left">‹</button>
      <button class="arrow right">›</button>

      <img
        src="photos/WrightK_Panning.JPG"
        class="hero-image"
      />

      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </section>

    <!-- RIGHT -->

    <section class="right-panel">

      <!-- PROFILE -->

      <div class="profile-card">

        <div class="profile-top">

          <img
            src="assets/profile/profile.jpg"
            class="profile-pic"
          />

          <div>
            <h2>Kaleb Wright</h2>
            <p>Photographer</p>
          </div>

        </div>

        <p class="bio">
          I'm Kaleb, a photographer focused on motion,
          cinematic lighting, storytelling, and atmosphere.
          My work blends experimental techniques with
          emotional visual composition.
        </p>

      </div>

      

      <!-- GALLERY -->

      <div class="gallery-header">
        <p>Latest Work</p>
        <a href="#">View All</a>
      </div>

      <div class="gallery-grid">

        <a href="categories/manual-settings.html" class="gallery-item big">

          <img src="photos/WrightK_Manual1.JPG" />

          <div class="overlay">
            <span>Manual</span>
            <h3>Settings</h3>
          </div>

        </a>

        <a href="categories/camera-motion.html" class="gallery-item">

          <img src="photos/WrightK_SubjectMotion.JPG" />

          <div class="overlay">
            <span>Camera</span>
            <h3>Motion</h3>
          </div>

        </a>

        <a href="categories/lighting.html" class="gallery-item tall">

          <img src="photos/WrightK_lightingPainting.jpg" />

          <div class="overlay">
            <span>Creative</span>
            <h3>Lighting</h3>
          </div>

        </a>

        <div class="gallery-item small">

          <img src="photos/WrightK_Triptyks.jpg" />

          <div class="overlay">
            <span>Visual</span>
            <h3>Triptychs</h3>
          </div>

        </div>

      </div>

    </section>

  </main>

</body>
</html>
